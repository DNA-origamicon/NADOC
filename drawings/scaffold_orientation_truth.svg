<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="350" viewBox="0 0 600 350">
  <!-- Dark background -->
  <rect width="600" height="350" fill="#0d1117"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="monospace" font-size="13" fill="#c9d1d9" font-weight="bold">
    NADOC Honeycomb — Scaffold Starting Orientation Ground Truth
  </text>
  <text x="300" y="46" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">
    bp=0, looking down +Z axis (X = right, Y = up, Z = into screen)
  </text>

  <!-- ===== LEFT CIRCLE: FORWARD cell ===== -->
  <!-- Circle background -->
  <circle cx="155" cy="175" r="80" fill="#1a2d4a" stroke="#2979c4" stroke-width="2.5"/>
  <!-- Helix center dot -->
  <circle cx="155" cy="175" r="4" fill="#c9d1d9"/>

  <!-- Scaffold arrow: FORWARD cell, scaffold bead at +X (right) -->
  <!-- Arrow shaft from center to right edge -->
  <line x1="155" y1="175" x2="225" y2="175" stroke="#29b6f6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="235,175 220,168 220,182" fill="#29b6f6"/>

  <!-- Staple bead at 210° from FORWARD = upper-left -->
  <!-- 210° in our formula: direction = (sin(210°), -cos(210°)) = (-0.5, +0.866) -->
  <!-- Staple bead position: cx + 70*(-0.5) = 155-35=120, cy + 70*(-0.866) = 175-60.6=114.4 -->
  <circle cx="120" cy="114" r="6" fill="#ff9800" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="112" y="102" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffcc80">staple</text>

  <!-- Scaffold bead marker at right -->
  <circle cx="235" cy="175" r="8" fill="#29b6f6" stroke="#81d4fa" stroke-width="1.5"/>

  <!-- Label: scaffold bead -->
  <text x="248" y="172" font-family="monospace" font-size="9" fill="#81d4fa">scaffold</text>
  <text x="248" y="183" font-family="monospace" font-size="9" fill="#81d4fa">bead</text>

  <!-- Minor groove arc indicator (120°) -->
  <path d="M 195 175 A 40 40 0 0 0 175 140" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="200" y="148" font-family="monospace" font-size="9" fill="#666">120°</text>

  <!-- Cell label above -->
  <text x="155" y="68" text-anchor="middle" font-family="monospace" font-size="12" fill="#58a6ff" font-weight="bold">FORWARD cell (val=0)</text>

  <!-- Labels below circle -->
  <text x="155" y="272" text-anchor="middle" font-family="monospace" font-size="10" fill="#29b6f6">phase_offset = 90° (π/2 rad)</text>
  <text x="155" y="287" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">scaffold bead at (+x, 0)</text>
  <text x="155" y="302" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">FORWARD strand: 5′→3′ in +Z</text>

  <!-- ===== RIGHT CIRCLE: REVERSE cell ===== -->
  <!-- Circle background -->
  <circle cx="445" cy="175" r="80" fill="#3a1a28" stroke="#b04060" stroke-width="2.5"/>
  <!-- Helix center dot -->
  <circle cx="445" cy="175" r="4" fill="#c9d1d9"/>

  <!-- Scaffold arrow: REVERSE cell, scaffold bead at −X (left) -->
  <!-- Arrow shaft from center to left edge -->
  <line x1="445" y1="175" x2="375" y2="175" stroke="#f48fb1" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Arrowhead pointing left -->
  <polygon points="365,175 380,168 380,182" fill="#f48fb1"/>

  <!-- Staple bead at 150° for FORWARD strand in REVERSE cell -->
  <!-- FORWARD (staple) in REVERSE cell: phase_offset=150°, so at 150°: direction=(sin(150°),-cos(150°))=(0.5,+0.866) -->
  <!-- Staple bead position: cx + 70*(0.5)=445+35=480, cy + 70*(-0.866)=175-60.6=114.4 -->
  <circle cx="480" cy="114" r="6" fill="#ff9800" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="488" y="102" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffcc80">staple</text>

  <!-- Scaffold bead marker at left -->
  <circle cx="365" cy="175" r="8" fill="#f48fb1" stroke="#f8bbd0" stroke-width="1.5"/>

  <!-- Label: scaffold bead -->
  <text x="280" y="172" font-family="monospace" font-size="9" fill="#f48fb1" text-anchor="end">scaffold</text>
  <text x="280" y="183" font-family="monospace" font-size="9" fill="#f48fb1" text-anchor="end">bead</text>

  <!-- Minor groove arc indicator (120°) -->
  <path d="M 405 175 A 40 40 0 0 1 425 140" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="388" y="148" font-family="monospace" font-size="9" fill="#666">120°</text>

  <!-- Cell label above -->
  <text x="445" y="68" text-anchor="middle" font-family="monospace" font-size="12" fill="#f48fb1" font-weight="bold">REVERSE cell (val=1)</text>

  <!-- Labels below circle -->
  <text x="445" y="272" text-anchor="middle" font-family="monospace" font-size="10" fill="#f48fb1">phase_offset = 150° (5π/6 rad)</text>
  <text x="445" y="287" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">scaffold bead at (−x, 0)</text>
  <text x="445" y="302" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">REVERSE strand: 5′→3′ in −Z</text>

  <!-- ===== Coordinate system in top-right corner ===== -->
  <g transform="translate(510, 75)">
    <!-- Background box -->
    <rect x="-10" y="-10" width="90" height="90" fill="#161b22" stroke="#30363d" stroke-width="1" rx="4"/>
    <!-- Origin -->
    <circle cx="30" cy="50" r="3" fill="#c9d1d9"/>
    <!-- X axis (right) -->
    <line x1="30" y1="50" x2="68" y2="50" stroke="#ff6b6b" stroke-width="2"/>
    <polygon points="70,50 63,46 63,54" fill="#ff6b6b"/>
    <text x="72" y="54" font-family="monospace" font-size="10" fill="#ff6b6b">X</text>
    <!-- Y axis (up) -->
    <line x1="30" y1="50" x2="30" y2="14" stroke="#6bcb77" stroke-width="2"/>
    <polygon points="30,10 26,17 34,17" fill="#6bcb77"/>
    <text x="34" y="14" font-family="monospace" font-size="10" fill="#6bcb77">Y</text>
    <!-- Z label -->
    <text x="2" y="72" font-family="monospace" font-size="8" fill="#8b949e">Z = into</text>
    <text x="2" y="82" font-family="monospace" font-size="8" fill="#8b949e">screen</text>
  </g>

  <!-- ===== Antiparallel note at bottom ===== -->
  <line x1="40" y1="318" x2="560" y2="318" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="335" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">
    Staple strand is 120° (minor groove) offset from scaffold bead. The two scaffolds are ANTIPARALLEL by construction.
  </text>

  <!-- Antiparallel indicator between circles -->
  <text x="300" y="178" text-anchor="middle" font-family="monospace" font-size="18" fill="#f0e68c">⟷</text>
  <text x="300" y="192" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0e68c">antiparallel</text>
</svg>
