# NAMD periodic unit-cell configuration generated by NADOC
# System: B_tube_periodic_1x  (162,671 atoms, TIP3P water + 150 mM NaCl)
# Mode:   EXPERIMENTAL CUDASOAintegrate, fixed-box NVT
# Cell:   initial Z = 7.0140 nm crossover period

structure          B_tube_periodic_1x.psf
coordinates        B_tube_periodic_1x.pdb

paraTypeCharmm     on
parameters         forcefield/par_all36_na.prm
parameters         forcefield/toppar_water_ions_na.str

# ── Periodic boundary conditions ──────────────────────────────────────────────
cellBasisVector1   161.027  0.000    0.000
cellBasisVector2   0.000    156.614  0.000
cellBasisVector3   0.000    0.000    70.140
cellOrigin         80.513   78.307   35.070

wrapAll            on
wrapWater          on
wrapNearest        on

# ── PME electrostatics ────────────────────────────────────────────────────────
PME                yes
PMEGridSpacing     1.0

# ── Nonbonded ─────────────────────────────────────────────────────────────────
cutoff             12.0
switching          on
switchdist         10.0
pairlistdist       48.0
exclude            scaled1-4
oneFourScaling     1.0

# ── Constraints ───────────────────────────────────────────────────────────────
rigidBonds         water
rigidTolerance     1.0e-8

# ── Thermostat — Langevin 310 K ────────────────────────────────────────────────
temperature        310
langevin           on
langevinDamping    5
langevinTemp       310
langevinHydrogen   off

# ── Barostat — disabled for benchmark ────────────────────────────────────────

# ── Integrator ────────────────────────────────────────────────────────────────
timestep           2.0
nonbondedFreq      1
fullElectFrequency 2
stepspercycle      10

# ── GPU-resident integration probe ────────────────────────────────────────────
# Periodic wrap bonds are ~70 Å apart in real-space coordinates. The large
# pairlist distance is an experiment to make those bonded exclusions visible to
# CUDASOAintegrate. Benchmark before trusting this mode.
GPUresident        on

# ── Output ────────────────────────────────────────────────────────────────────
outputName         output/B_tube_periodic_1x_bench_gpu_pair48
outputEnergies     500
dcdFreq            999999999
dcdFile            output/B_tube_periodic_1x_bench_gpu_pair48.dcd
xstFreq            5000
xstFile            output/B_tube_periodic_1x_bench_gpu_pair48.xst
restartfreq        50000
binaryrestart      yes


# ── Run ───────────────────────────────────────────────────────────────────────
minimize           50        ;# pre-benchmark EM (not timed)
reinitvels         310
run                200       ;# benchmark steps
