# NAMD periodic unit-cell configuration generated by NADOC
# System: B_tube_periodic_1x  (162,671 atoms, TIP3P water + 150 mM NaCl)
# Mode:   standard CUDA, restrained NPT box discovery
# Cell:   initial Z = 7.0140 nm crossover period

structure          B_tube_periodic_1x.psf
coordinates        B_tube_periodic_1x.pdb

paraTypeCharmm     on
parameters         forcefield/par_all36_na.prm
parameters         forcefield/toppar_water_ions_na.str

# ── Periodic boundary conditions ──────────────────────────────────────────────
cellBasisVector1   161.027  0.000    0.000
cellBasisVector2   0.000    156.614  0.000
cellBasisVector3   0.000    0.000    70.140
cellOrigin         80.513   78.307   35.070

wrapAll            on
wrapWater          on
wrapNearest        on

# ── PME electrostatics ────────────────────────────────────────────────────────
PME                yes
PMEGridSpacing     1.0

# ── Nonbonded ─────────────────────────────────────────────────────────────────
cutoff             12.0
switching          on
switchdist         10.0
pairlistdist       16.0
exclude            scaled1-4
oneFourScaling     1.0

# ── Constraints ───────────────────────────────────────────────────────────────
rigidBonds         water
rigidTolerance     1.0e-8

# ── Thermostat — Langevin 310 K ────────────────────────────────────────────────
temperature        310
langevin           on
langevinDamping    5
langevinTemp       310
langevinHydrogen   off

# ── Barostat — restrained NPT box discovery ──────────────────────────────────
useGroupPressure   yes
useFlexibleCell    no
useConstantArea    no
langevinPiston     on
langevinPistonTarget  1.01325
langevinPistonPeriod  200.0
langevinPistonDecay   100.0
langevinPistonTemp    310

# ── Integrator ────────────────────────────────────────────────────────────────
timestep           2.0        ;# 2 fs — safe with rigidBonds water
nonbondedFreq      1
fullElectFrequency 2
stepspercycle      10

# ── GPU acceleration (standard CUDA, not GPU-resident) ────────────────────────
# CUDASOAintegrate (GPU-resident) is disabled: wrap bonds span the periodic cell
# (O3' at z_end bonded to P at z_start, 7 nm apart in real space).  GPU-resident
# mode builds its exclusion list from pairlist distances and cannot find those
# partners → "Low global CUDA exclusion count" abort.  Standard CUDA mode handles
# PBC-wrapped bonded exclusions correctly via CPU bonded-force path.

# ── Output ────────────────────────────────────────────────────────────────────
outputName         output/B_tube_periodic_1x_smoke_equilibrate_npt
outputEnergies     500
dcdFreq            5000
dcdFile            output/B_tube_periodic_1x_smoke_equilibrate_npt.dcd
xstFreq            500
xstFile            output/B_tube_periodic_1x_smoke_equilibrate_npt.xst
restartfreq        5000
binaryrestart      yes


# ── DNA restraints: B-factor column stores force constant kcal/mol/Å² ─────────
constraints        on
consref            B_tube_periodic_1x_restraints.pdb
conskfile          B_tube_periodic_1x_restraints.pdb
conskcol           B

# ── Run ───────────────────────────────────────────────────────────────────────
minimize           500       ;# brief EM to relieve any solvation clashes
reinitvels         310
constraintScaling  1.0        ;# DNA heavy atoms restrained at k=1 kcal/mol/Å²
run                5000       ;# smoke restrained NPT
