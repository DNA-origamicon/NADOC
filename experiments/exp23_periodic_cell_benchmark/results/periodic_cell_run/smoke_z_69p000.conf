# NAMD periodic unit-cell configuration generated by NADOC
# System: B_tube_periodic_1x  (162,671 atoms, TIP3P water + 150 mM NaCl)
# Mode:   standard CUDA, fixed-box locked-Z NVT
# Cell:   initial Z = 7.0140 nm crossover period

structure          B_tube_periodic_1x.psf
coordinates        B_tube_periodic_1x.pdb

paraTypeCharmm     on
parameters         forcefield/par_all36_na.prm
parameters         forcefield/toppar_water_ions_na.str

# ── Periodic boundary conditions ──────────────────────────────────────────────
cellBasisVector1   154.355  0.000    0.000
cellBasisVector2   0.000    150.125  0.000
cellBasisVector3   0.000    0.000    69.000
cellOrigin         80.513   78.307   35.070

wrapAll            on
wrapWater          on
wrapNearest        on

# ── PME electrostatics ────────────────────────────────────────────────────────
PME                yes
PMEGridSpacing     1.0

# ── Nonbonded ─────────────────────────────────────────────────────────────────
cutoff             12.0
switching          on
switchdist         10.0
pairlistdist       16.0
exclude            scaled1-4
oneFourScaling     1.0

# ── Constraints ───────────────────────────────────────────────────────────────
rigidBonds         water
rigidTolerance     1.0e-8

# ── Thermostat — Langevin 310 K ────────────────────────────────────────────────
langevin           on
langevinDamping    5
langevinTemp       310
langevinHydrogen   off

# ── Barostat — disabled for locked-Z production ──────────────────────────────
# Pressure is handled by the preceding NPT box-discovery phase. This phase fixes
# X/Y from the stable NPT tail and forces Z back to the exact 21 bp period.

# ── Integrator ────────────────────────────────────────────────────────────────
timestep           2.0
nonbondedFreq      1
fullElectFrequency 2
stepspercycle      10

# ── GPU acceleration (standard CUDA, not GPU-resident) ────────────────────────
# See benchmark_gpu_resident.conf for the experimental CUDASOA probe.

# ── Output ────────────────────────────────────────────────────────────────────
outputName         output/B_tube_periodic_1x_smoke_z_69p000
outputEnergies     500
dcdFreq            5000
dcdFile            output/B_tube_periodic_1x_smoke_z_69p000.dcd
xstFreq            500
xstFile            output/B_tube_periodic_1x_smoke_z_69p000.xst
restartfreq        5000
binaryrestart      yes


# ── Run ───────────────────────────────────────────────────────────────────────
binCoordinates     output/B_tube_periodic_1x_smoke_equilibrate_npt.restart.coor
binVelocities      output/B_tube_periodic_1x_smoke_equilibrate_npt.restart.vel
run                1000       ;# smoke locked-Z production
