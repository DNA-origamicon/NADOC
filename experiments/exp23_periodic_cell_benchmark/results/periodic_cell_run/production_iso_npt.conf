# NAMD periodic unit-cell configuration — isotropic NPT production
# System: B_tube_periodic_1x  (162,671 atoms, TIP3P water + 150 mM NaCl)
# Mode:   standard CUDA, isotropic NPT, no DNA restraints
#
# Why isotropic instead of anisotropic NPT:
#   Anisotropic NPT (useFlexibleCell yes) caused uncontrolled Z expansion
#   (70.14→93 Å in 556 ps) because the barostat scales all atom coordinates
#   proportionally when it rescales each dimension, and the initial rectangular
#   cell (155×151×70 Å) has lower XY pressure than Z → barostat contracts XY
#   and expands Z to balance, defeating the periodic Lz constraint.
#   Isotropic NPT scales all three axes by the same factor → Lz stays within
#   ≪ 1 Å of 70.14 Å for the small pressure deviations expected here.

structure          B_tube_periodic_1x.psf
coordinates        B_tube_periodic_1x.pdb

paraTypeCharmm     on
parameters         forcefield/par_all36_na.prm
parameters         forcefield/toppar_water_ions_na.str

# ── Periodic boundary conditions ──────────────────────────────────────────────
# Cell from ramp_v2_03 restart (NVT: cell unchanged at 155.602×151.338×70.14 Å)
cellBasisVector1   155.602  0.000    0.000
cellBasisVector2   0.000    151.338  0.000
cellBasisVector3   0.000    0.000    70.140
cellOrigin         80.513   78.307   35.070

wrapAll            on
wrapWater          on
wrapNearest        on

# ── PME electrostatics ────────────────────────────────────────────────────────
PME                yes
PMEGridSpacing     1.0

# ── Nonbonded ─────────────────────────────────────────────────────────────────
cutoff             12.0
switching          on
switchdist         10.0
pairlistdist       16.0
exclude            scaled1-4
oneFourScaling     1.0

# ── Constraints ───────────────────────────────────────────────────────────────
rigidBonds         water
rigidTolerance     1.0e-8

# ── Thermostat — Langevin 310 K ────────────────────────────────────────────────
langevin           on
langevinDamping    5
langevinTemp       310
langevinHydrogen   off

# ── Barostat — isotropic NPT ──────────────────────────────────────────────────
# useFlexibleCell no → isotropic: X, Y, Z all scale by the same factor.
# The solvation box is already near bulk density so volume fluctuations are small;
# uniform scaling keeps Lz at 70.14 ± < 0.5 Å throughout production.
useGroupPressure      yes
useFlexibleCell       no
langevinPiston        on
langevinPistonTarget  1.01325
langevinPistonPeriod  200.0
langevinPistonDecay   100.0
langevinPistonTemp    310

# ── Integrator ────────────────────────────────────────────────────────────────
timestep           2.0
nonbondedFreq      1
fullElectFrequency 2
stepspercycle      10

# ── Output ────────────────────────────────────────────────────────────────────
outputName         output/B_tube_periodic_1x_production_iso_npt
outputEnergies     500
dcdFreq            1000
dcdFile            output/B_tube_periodic_1x_production_iso_npt.dcd
xstFreq            500
xstFile            output/B_tube_periodic_1x_production_iso_npt.xst
restartfreq        50000
binaryrestart      yes

# ── Restart from ramp_v2_03 — velocity continuation ──────────────────────────
binCoordinates     output/B_tube_periodic_1x_ramp_v2_03.restart.coor
binVelocities      output/B_tube_periodic_1x_ramp_v2_03.restart.vel

run                25000000       ;# 50 ns production
