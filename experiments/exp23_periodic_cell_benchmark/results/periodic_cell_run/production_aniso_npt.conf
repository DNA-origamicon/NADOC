# NAMD periodic unit-cell configuration — anisotropic NPT production
# System: B_tube_periodic_1x  (162,671 atoms, TIP3P water + 150 mM NaCl)
# Mode:   standard CUDA, anisotropic NPT (useFlexibleCell yes), no DNA restraints
# Per Erban & Togashi (2023): production must NOT lock Z; anisotropic NPT with
# all three axes independent satisfies this.  With no absolute-position restraints,
# the barostat can change Z freely and the crossover wrap bonds confine Z to its
# physical CHARMM36 equilibrium range.

structure          B_tube_periodic_1x.psf
coordinates        B_tube_periodic_1x.pdb

paraTypeCharmm     on
parameters         forcefield/par_all36_na.prm
parameters         forcefield/toppar_water_ions_na.str

# ── Periodic boundary conditions (initial cell from relax/ramp equilibration) ─
# Cell vectors from ramp_v2_03 restart (written at run time by lock_box_from_xst).
cellBasisVector1   155.602  0.000    0.000
cellBasisVector2   0.000    151.338  0.000
cellBasisVector3   0.000    0.000    70.140
cellOrigin         80.513   78.307   35.070

wrapAll            on
wrapWater          on
wrapNearest        on

# ── PME electrostatics ────────────────────────────────────────────────────────
PME                yes
PMEGridSpacing     1.0

# ── Nonbonded ─────────────────────────────────────────────────────────────────
cutoff             12.0
switching          on
switchdist         10.0
pairlistdist       16.0
exclude            scaled1-4
oneFourScaling     1.0
margin             5.0          ;# headroom for anisotropic cell fluctuations

# ── Constraints ───────────────────────────────────────────────────────────────
rigidBonds         water
rigidTolerance     1.0e-8

# ── Thermostat — Langevin 310 K ────────────────────────────────────────────────
langevin           on
langevinDamping    5
langevinTemp       310
langevinHydrogen   off

# ── Barostat — anisotropic NPT, all three axes independent ───────────────────
# Per E&T (2023): production with asymmetric PBC requires XY-flexible, Z-free
# barostat.  No absolute-position DNA restraints are present, so the anisotropic
# piston will find the physical CHARMM36 equilibrium cell for this crossover-
# constrained system.  Z will converge to the equilibrium helical rise for
# CHARMM36 B-DNA under the honeycomb crossover constraints (~70–71 Å expected).
useGroupPressure      yes
useFlexibleCell       yes
useConstantArea       no
useConstantRatio      no
langevinPiston        on
langevinPistonTarget  1.01325
langevinPistonPeriod  200.0
langevinPistonDecay   100.0
langevinPistonTemp    310

# ── Integrator ────────────────────────────────────────────────────────────────
timestep           2.0
nonbondedFreq      1
fullElectFrequency 2
stepspercycle      10

# ── Output ────────────────────────────────────────────────────────────────────
outputName         output/B_tube_periodic_1x_production_aniso_npt
outputEnergies     500
dcdFreq            1000
dcdFile            output/B_tube_periodic_1x_production_aniso_npt.dcd
xstFreq            500
xstFile            output/B_tube_periodic_1x_production_aniso_npt.xst
restartfreq        50000
binaryrestart      yes

# ── Restart from ramp_v2_03 — velocity continuation ──────────────────────────
binCoordinates     output/B_tube_periodic_1x_ramp_v2_03.restart.coor
binVelocities      output/B_tube_periodic_1x_ramp_v2_03.restart.vel

run                25000000       ;# 50 ns production
