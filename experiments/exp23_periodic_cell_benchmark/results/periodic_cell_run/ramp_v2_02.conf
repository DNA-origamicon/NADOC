# NAMD periodic unit-cell configuration generated by NADOC (v2 ramp)
# System: B_tube_periodic_1x  (162,671 atoms, TIP3P water + 150 mM NaCl)
# Mode:   standard CUDA, fixed-box locked-Z NVT, restrained ramp stage 02
# k=0.10 kcal/mol/Å², 200 ps — velocity continuation from ramp_v2_01

structure          B_tube_periodic_1x.psf
coordinates        B_tube_periodic_1x.pdb

paraTypeCharmm     on
parameters         forcefield/par_all36_na.prm
parameters         forcefield/toppar_water_ions_na.str

# ── Periodic boundary conditions ──────────────────────────────────────────────
cellBasisVector1   155.602  0.000    0.000
cellBasisVector2   0.000    151.338  0.000
cellBasisVector3   0.000    0.000    70.140
cellOrigin         80.513   78.307   35.070

wrapAll            on
wrapWater          on
wrapNearest        on

# ── PME electrostatics ────────────────────────────────────────────────────────
PME                yes
PMEGridSpacing     1.0

# ── Nonbonded ─────────────────────────────────────────────────────────────────
cutoff             12.0
switching          on
switchdist         10.0
pairlistdist       16.0
exclude            scaled1-4
oneFourScaling     1.0

# ── Constraints ───────────────────────────────────────────────────────────────
rigidBonds         water
rigidTolerance     1.0e-8

# ── Thermostat — Langevin 310 K ────────────────────────────────────────────────
langevin           on
langevinDamping    5
langevinTemp       310
langevinHydrogen   off

# ── Integrator ────────────────────────────────────────────────────────────────
timestep           2.0
nonbondedFreq      1
fullElectFrequency 2
stepspercycle      10

# ── Output ────────────────────────────────────────────────────────────────────
outputName         output/B_tube_periodic_1x_ramp_v2_02
outputEnergies     500
dcdFreq            1000
dcdFile            output/B_tube_periodic_1x_ramp_v2_02.dcd
xstFreq            500
xstFile            output/B_tube_periodic_1x_ramp_v2_02.xst
restartfreq        50000
binaryrestart      yes

# ── DNA restraints ────────────────────────────────────────────────────────────
constraints        on
consref            B_tube_periodic_1x_restraints.pdb
conskfile          B_tube_periodic_1x_restraints.pdb
conskcol           B
constraintScaling  0.100

# ── Restart from ramp_v2_01 — velocity continuation ──────────────────────────
binCoordinates     output/B_tube_periodic_1x_ramp_v2_01.restart.coor
binVelocities      output/B_tube_periodic_1x_ramp_v2_01.restart.vel

run                100000       ;# 200 ps
